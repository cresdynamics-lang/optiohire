services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: optiohire-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: optiohire
      POSTGRES_USER: optiohire_user
      POSTGRES_PASSWORD: optiohire_pass_2024
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U optiohire_user -d optiohire"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: optiohire-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: optiohire-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://optiohire_user:optiohire_pass_2024@postgres:5432/optiohire
      REDIS_URL: redis://redis:6379
      DB_SSL: "false"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/.env:/app/.env:ro
      - ./backend/storage:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: optiohire-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      BACKEND_URL: http://backend:3001
      NEXT_PUBLIC_BACKEND_URL: http://localhost:3001
      DATABASE_URL: postgresql://optiohire_user:optiohire_pass_2024@postgres:5432/optiohire
      DB_SSL: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./backend/.env:/app/.env:ro
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:

