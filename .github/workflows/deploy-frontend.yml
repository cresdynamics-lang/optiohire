name: Deploy Frontend to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  deploy:
    name: Deploy Frontend to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Frontend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 20m
          script: |
            set -e
            echo "=== Pulling latest code ==="
            cd /var/www/optiohire
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            echo "=== Building frontend ==="
            cd /var/www/optiohire/frontend
            # Pull environment variables if necessary (usually they are stored in .env.local on the server)
            # If backend has them, you might want to link them or use a shared .env
            
            npm install
            npm run build

            echo "=== Restarting Frontend Service ==="
            pm2 delete optiohire-frontend 2>/dev/null || true
            pm2 start npm --name "optiohire-frontend" -- run start -p 3000
            pm2 save

            echo "=== Deployment complete ==="
            pm2 list
