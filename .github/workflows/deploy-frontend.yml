name: Deploy Frontend to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  deploy:
    name: Deploy Frontend to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Frontend
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_BACKEND_URL: https://api.optiohire.com
        run: npm run build

      - name: Copy .next folder via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "frontend/.next"
          target: "/var/www/optiohire"

      - name: Restart Frontend Service via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -e
            echo "=== Pulling latest code for other files ==="
            cd /var/www/optiohire
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            echo "=== Installing Prod Dependencies ==="
            cd /var/www/optiohire/frontend
            npm install --omit=dev

            echo "=== Restarting Frontend Service ==="
            pm2 delete optiohire-frontend 2>/dev/null || true
            pm2 start npm --name "optiohire-frontend" -- run start
            pm2 save
            
            echo "=== Deployment complete ==="
            pm2 list
