name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          command_timeout: 20m
          script: |
            set -e
            echo "=== Pulling latest code ==="
            cd /var/www/optiohire
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            echo "=== Building backend ==="
            cd /var/www/optiohire/backend
            npm ci
            npm run build

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend locally
        run: |
          cd frontend
          npm ci --legacy-peer-deps
          npm run build
          # Fix standalone missing CSS/Assets
          cp -r public .next/standalone/ 2>/dev/null || true
          cp -r .next/static .next/standalone/.next/ 2>/dev/null || true

      - name: Sync frontend build to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          source: "frontend/.next/standalone,frontend/.next/static"
          target: "/var/www/optiohire/frontend/.next"
          strip_components: 2

      - name: Restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            echo "=== Restarting services ==="
            pm2 delete optiohire-backend 2>/dev/null || true
            pm2 delete optiohire-frontend 2>/dev/null || true
            pm2 start /var/www/optiohire/backend/dist/server.js --name optiohire-backend --env production
            echo "=== Copying env files for standalone Next.js ==="
            cp /var/www/optiohire/frontend/.env.local /var/www/optiohire/frontend/.next/standalone/.env.local 2>/dev/null || true
            pm2 start "node /var/www/optiohire/frontend/.next/standalone/server.js" --name optiohire-frontend --env production
            pm2 save

            echo "=== Reloading Nginx ==="
            nginx -t && systemctl reload nginx

            echo "=== Deployment complete ==="
            pm2 list
