name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          command_timeout: 20m
          script: |
            set -e
            echo "=== Pulling latest code ==="
            cd /root/optiohire
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            echo "=== Building backend ==="
            cd /root/optiohire/backend
            npm ci
            npm run build

            echo "=== Building frontend ==="
            cd /root/optiohire/frontend
            npm ci --legacy-peer-deps
            rm -rf .next
            npm run build
            
            # Fix standalone missing CSS/Assets
            cp -r public .next/standalone/ 2>/dev/null || true
            cp -r .next/static .next/standalone/.next/ 2>/dev/null || true

            echo "=== Restarting services ==="
            pm2 delete optiohire-backend 2>/dev/null || true
            pm2 delete optiohire-frontend 2>/dev/null || true
            pm2 start /root/optiohire/backend/dist/server.js --name optiohire-backend --env production
            pm2 start "node /root/optiohire/frontend/.next/standalone/server.js" --name optiohire-frontend --env production
            pm2 save

            echo "=== Reloading Nginx ==="
            nginx -t && systemctl reload nginx

            echo "=== Deployment complete ==="
            pm2 list
