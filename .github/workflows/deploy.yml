name: Deploy Backend to Production

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    name: Deploy Backend to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Build Backend
        working-directory: ./backend
        run: npm run build

      - name: Copy dist folder via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "backend/dist"
          target: "/var/www/optiohire"

      - name: Deploy Backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -e
            echo "=== Pulling latest code for other files ==="
            cd /var/www/optiohire
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            echo "=== Installing Prod Dependencies ==="
            cd /var/www/optiohire/backend
            npm ci

            echo "=== Running Database Migrations ==="
            npm run db:schema
            npx tsx migrate-prod.ts

            echo "=== Restarting Backend Service ==="
            pm2 delete optiohire-backend 2>/dev/null || true
            pm2 start dist/server.js --name optiohire-backend
            pm2 save

            echo "=== Deployment complete ==="
            pm2 list

            echo "=== Verifying Backend ==="
            sleep 3
            curl -s -o /dev/null -w "Backend HTTP: %{http_code}\n" http://127.0.0.1:3001/api/health || true

      - name: Trigger Vercel Deployment
        run: |
          curl -X POST "${{ secrets.VERCEL_HOOK }}"
