name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 20m
          script: |
            set -e
            echo "=== Pulling latest code ==="
            cd /var/www/optiohire
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            echo "=== Building backend ==="
            cd /var/www/optiohire/backend
            npm ci
            npm run build

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend in CI
        run: |
          cd frontend
          # Use .env.production for the build (bakes NEXT_PUBLIC_ vars into JS bundle)
          cp .env.production .env.local
          npm ci --legacy-peer-deps
          npm run build
          # Fix standalone missing CSS/Assets
          cp -r public .next/standalone/ 2>/dev/null || true
          cp -r .next/static .next/standalone/.next/ 2>/dev/null || true

      - name: Sync frontend build to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "frontend/.next/standalone,frontend/.next/static"
          target: "/var/www/optiohire/frontend/.next"
          strip_components: 2

      - name: Configure Nginx and Restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e

            echo "=== Updating frontend .env.local on server ==="
            cat > /var/www/optiohire/frontend/.env.local << 'ENVEOF'
            # Frontend Environment Variables - PRODUCTION (server-side runtime)
            BACKEND_URL=http://127.0.0.1:3001
            NEXT_PUBLIC_BACKEND_URL=https://optiohire.com
            NEXT_PUBLIC_APP_URL=https://optiohire.com
            NEXT_PUBLIC_API_URL=https://optiohire.com/api
            NEXTAUTH_URL=https://optiohire.com
            NEXTAUTH_SECRET=5e3d2e4d7f9a4bc8e2d6f4a9b3c8e7f0a9b3c8e7f9a4d6f4a9b3c8e7f0a9b3
            JWT_SECRET=a6869b3fb2a7b56cb33c58d07cf69548ee1ccbe9f6ec2aa54ce13d1a1bafeedae2d88ee36ed7d92f0e29d573d68c2335fe187eb7cf3890be9b7d4bf216cfd568
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=9363904405900-e0i5c40qaeqfq3uk1t570k6ibqibp5e@apps.googleusercontent.com
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            DB_SSL=false
            ENVEOF
            # Remove leading whitespace from heredoc
            sed -i 's/^            //' /var/www/optiohire/frontend/.env.local

            echo "=== Restarting services ==="
            pm2 delete optiohire-backend 2>/dev/null || true
            pm2 delete optiohire-frontend 2>/dev/null || true

            cd /var/www/optiohire/backend
            pm2 start dist/server.js --name optiohire-backend

            echo "=== Copying env files for standalone Next.js ==="
            cp /var/www/optiohire/frontend/.env.local /var/www/optiohire/frontend/.next/standalone/.env.local 2>/dev/null || true
            cd /var/www/optiohire/frontend/.next/standalone
            pm2 start server.js --name optiohire-frontend
            pm2 save

            echo "=== Writing Nginx config ==="
            cat > /etc/nginx/sites-available/optiohire << 'NGINXEOF'
            server {
                listen 80;
                listen 443 ssl;
                server_name www.optiohire.com;
                ssl_certificate /etc/letsencrypt/live/optiohire.com-0001/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/optiohire.com-0001/privkey.pem;
                include /etc/letsencrypt/options-ssl-nginx.conf;
                ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
                return 301 https://optiohire.com$request_uri;
            }
            server {
                listen 80;
                server_name optiohire.com;
                return 301 https://optiohire.com$request_uri;
            }
            server {
                listen 443 ssl;
                server_name optiohire.com;
                ssl_certificate /etc/letsencrypt/live/optiohire.com-0001/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/optiohire.com-0001/privkey.pem;
                include /etc/letsencrypt/options-ssl-nginx.conf;
                ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
                location ^~ /storage/ {
                    proxy_pass http://127.0.0.1:3001;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }
                location ^~ /_next/static {
                    proxy_pass http://127.0.0.1:3000;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    add_header Cache-Control "public, max-age=31536000, immutable";
                }
                location / {
                    proxy_pass http://127.0.0.1:3000;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_read_timeout 60s;
                }
            }
            NGINXEOF
            sed -i 's/^            //' /etc/nginx/sites-available/optiohire
            ln -sf /etc/nginx/sites-available/optiohire /etc/nginx/sites-enabled/optiohire
            rm -f /etc/nginx/sites-enabled/default

            echo "=== Testing and reloading Nginx ==="
            nginx -t && systemctl reload nginx

            echo "=== Deployment complete ==="
            pm2 list

            echo "=== Verifying ==="
            sleep 3
            curl -s -o /dev/null -w "Backend HTTP: %{http_code}\n" http://127.0.0.1:3001/api/health || true
            curl -s -o /dev/null -w "www redirect: %{http_code}\n" --max-redirs 0 http://www.optiohire.com || true
