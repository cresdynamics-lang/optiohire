name: CI (Continuous Integration)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install Monorepo Dependencies
        run: npm install

      - name: Install Backend Dependencies
        run: cd backend && npm ci

      - name: Install Frontend Dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Run All Tests
        run: npm test
        env:
          # These are required by the app but mocked internally during tests
          JWT_SECRET: ${{ secrets.TEST_JWT_SECRET || 'ci-placeholder-secret' }}
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL || 'postgres://ci:ci@localhost/ci' }}
          NODE_ENV: 'test'
